{% load static %}
<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <!-- Apply theme immediately to prevent FOUC (Flash of Unstyled Content) -->
  <script>
    (function() {
      // Получаем тему из localStorage или устанавливаем темную по умолчанию
      var theme = localStorage.getItem('theme') || 'dark';
      // Применяем тему к документу до загрузки остального контента
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'salary/styles.css' %}" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

{% block body %}
<div class="login-page-wrapper">
  <div class="login-container">
    <div class="login-card">
      <h4 class="mb-4 text-center">Вход</h4>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger">Неверное имя пользователя или пароль.</div>
        {% endif %}
        <div class="mb-3">
          <label for="username" class="form-label">Имя пользователя</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Пароль</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary w-100">Войти</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
</body>
</html>
