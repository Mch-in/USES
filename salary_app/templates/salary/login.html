{% load static %}
{% load i18n %}
<!DOCTYPE html>
<html lang="{{ LANGUAGE_CODE|default:'ru' }}" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>USES | {% trans "Log in" %}</title>
  <!-- Apply theme immediately to prevent FOUC -->
  <script src="{% static 'salary/head-init.js' %}"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="{% static 'salary/styles.css' %}" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

{% block body %}
<div class="login-page-wrapper">
  <div class="login-container">
    <div class="login-card">
      <h4 class="mb-4 text-center">{% trans "Log in" %}</h4>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}
          <div class="alert alert-danger">{% trans "Incorrect username or password." %}</div>
        {% endif %}
        <div class="mb-3">
          <label for="username" class="form-label">{% trans "Username" %}</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">{% trans "Password" %}</label>
          <div class="input-group">
            <input type="password" name="password" class="form-control" required>
            <button class="btn toggle-password" type="button" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100">{% trans "Sign in" %}</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
<script>
  $(document).on('click', '.toggle-password', function() {
    var $input = $(this).closest('.input-group').find('input');
    var $icon = $(this).find('i');
    if ($input.attr('type') === 'password') {
      $input.attr('type', 'text');
      $icon.removeClass('bi-eye').addClass('bi-eye-slash');
    } else {
      $input.attr('type', 'password');
      $icon.removeClass('bi-eye-slash').addClass('bi-eye');
    }
  });
</script>
</body>
</html>
